<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudFileServer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #c9d1d9;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .toolbar {
      background: #161b22;
      border-bottom: 1px solid #21262d;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .btn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: background 0.1s;
    }

    .btn:hover { background: #30363d; }
    .btn:active { background: #388bfd22; border-color: #58a6ff; }

    .ext-input {
      background: #0d1117;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      width: 80px;
    }

    .ext-input:focus { outline: none; border-color: #58a6ff; }

    .toolbar-sep {
      width: 1px;
      height: 18px;
      background: #30363d;
      margin: 0 4px;
    }

    header h1 {
      font-size: 15px;
      color: #58a6ff;
      letter-spacing: 1px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
      box-shadow: 0 0 6px #3fb950;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Tree panel */
    .panel-tree {
      width: 380px;
      min-width: 220px;
      background: #0d1117;
      border-right: 1px solid #21262d;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-title {
      padding: 8px 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8b949e;
      border-bottom: 1px solid #21262d;
      background: #161b22;
      flex-shrink: 0;
    }

    #tree-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    #tree-container::-webkit-scrollbar { width: 6px; }
    #tree-container::-webkit-scrollbar-track { background: transparent; }
    #tree-container::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    .tree-node {
      user-select: none;
    }

    .tree-row {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      cursor: pointer;
      white-space: nowrap;
      border-radius: 4px;
      margin: 1px 4px;
      transition: background 0.1s;
    }

    .tree-row:hover { background: #21262d; }

    .toggle {
      width: 14px;
      display: inline-block;
      text-align: center;
      color: #8b949e;
      font-size: 10px;
      flex-shrink: 0;
    }

    .icon { flex-shrink: 0; }

    .node-name {
      color: #c9d1d9;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .node-name.dir { color: #58a6ff; }

    .tree-row.selected { background: #1f6feb33; border-left: 2px solid #58a6ff; }

    @keyframes highlight-flash {
      0%   { background: #d29922aa; }
      100% { background: transparent; }
    }
    .tree-row.highlight { animation: highlight-flash 1.5s ease-out forwards; }

    .node-meta {
      color: #484f58;
      font-size: 11px;
      margin-left: 6px;
      flex-shrink: 0;
    }

    .tags {
      display: flex;
      gap: 4px;
      margin-left: 4px;
      flex-shrink: 0;
    }

    .tag-chip {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
      color: #0d1117;
      white-space: nowrap;
    }

    .children { display: block; }
    .children.hidden { display: none; }

    /* Log panel */
    .panel-log {
      flex: 1;
      background: #0d1117;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #log-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 14px;
    }

    #log-container::-webkit-scrollbar { width: 6px; }
    #log-container::-webkit-scrollbar-track { background: transparent; }
    #log-container::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    .log-entry {
      display: flex;
      gap: 10px;
      padding: 2px 0;
      border-bottom: 1px solid #161b22;
      line-height: 1.6;
    }

    .log-time {
      color: #484f58;
      flex-shrink: 0;
      min-width: 90px;
    }

    .log-msg { color: #c9d1d9; }
    .log-msg.info { color: #3fb950; }
    .log-msg.error { color: #f85149; }
    .log-msg.warn { color: #d29922; }

    /* Detail pane at bottom of log */
    #detail-pane {
      border-top: 1px solid #21262d;
      padding: 10px 14px;
      background: #161b22;
      font-size: 12px;
      min-height: 60px;
      flex-shrink: 0;
      color: #8b949e;
    }

    #detail-pane table { border-collapse: collapse; width: 100%; }
    #detail-pane td { padding: 2px 8px 2px 0; vertical-align: top; }
    #detail-pane td:first-child { color: #484f58; white-space: nowrap; min-width: 110px; }
    #detail-pane td:last-child { color: #c9d1d9; }

    .loading-placeholder {
      padding: 20px 14px;
      color: #484f58;
    }
  </style>
</head>
<body>

<header>
  <div class="status-dot" id="status-dot"></div>
  <h1>CloudFileServer &mdash; File Tree Monitor</h1>
</header>

<div class="toolbar">
  <button class="btn" onclick="calcSize()">計算總容量</button>
  <div class="toolbar-sep"></div>
  <input class="ext-input" id="ext-input" type="text" placeholder=".docx" value=".docx" />
  <button class="btn" onclick="searchExt()">副檔名搜尋</button>
  <div class="toolbar-sep"></div>
  <button class="btn" onclick="exportXml()">XML 輸出</button>
  <div class="toolbar-sep"></div>
  <button class="btn" onclick="clearLog()">清理視窗</button>
</div>

<div class="main">
  <!-- Left: Tree panel -->
  <div class="panel-tree">
    <div class="panel-title">File Tree</div>
    <div id="tree-container">
      <div class="loading-placeholder">Loading...</div>
    </div>
  </div>

  <!-- Right: Log + Detail -->
  <div class="panel-log">
    <div class="panel-title">Event Log</div>
    <div id="log-container"></div>
    <div id="detail-pane">
      <span style="color:#484f58">Click a node to view details.</span>
    </div>
  </div>
</div>

<script>
  // ---- Logging ----
  function log(msg, level = 'info') {
    const container = document.getElementById('log-container');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    const now = new Date();
    const time = now.toTimeString().slice(0, 8);
    entry.innerHTML =
      `<span class="log-time">${time}</span>` +
      `<span class="log-msg ${level}">${escHtml(msg)}</span>`;
    container.appendChild(entry);
    container.scrollTop = container.scrollHeight;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ---- Detail pane ----
  function showDetail(node) {
    const pane = document.getElementById('detail-pane');
    const rows = [
      ['ID', node.id],
      ['Name', node.name],
      ['Type', node.typeCode],
      ['Created', new Date(node.createdAt).toLocaleString()],
      ['Updated', new Date(node.updatedAt).toLocaleString()],
    ];

    if (!node.isDirectory) {
      rows.push(['Size', node.sizeFormatted ?? '—']);
      rows.push(['Path', node.storagePath ?? '—']);
    }
    if (node.typeCode === 'Image') {
      rows.push(['Dimensions', `${node.widthPx} x ${node.heightPx} px`]);
    }
    if (node.typeCode === 'Text') {
      rows.push(['Encoding', node.encoding ?? '—']);
    }
    if (node.typeCode === 'Word') {
      rows.push(['Pages', node.pageCount ?? '—']);
    }
    if (node.tags && node.tags.length > 0) {
      rows.push(['Tags', node.tags.map(t => t.name).join(', ')]);
    }

    pane.innerHTML = '<table>' +
      rows.map(([k, v]) =>
        `<tr><td>${escHtml(k)}</td><td>${escHtml(String(v ?? '—'))}</td></tr>`
      ).join('') +
      '</table>';
  }

  function formatBytes(bytes) {
    if (bytes == null) return '—';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function clearHighlights() {
    nodeRowMap.forEach(row => row.classList.remove('highlight'));
  }

  // ---- Selected node tracking ----
  let selectedNodeId = null;
  let selectedRow = null;
  const nodeRowMap = new Map(); // nodeId → row element

  // ---- Tree rendering ----

  function countNodes(nodes) {
    let count = 0;
    for (const node of nodes) {
      count++;
      if (node.children) count += countNodes(node.children);
    }
    return count;
  }

  function renderTree(nodes, depth = 0) {
    const fragment = document.createDocumentFragment();

    for (const node of nodes) {
      const wrapper = document.createElement('div');
      wrapper.className = 'tree-node';

      const row = document.createElement('div');
      row.className = 'tree-row';
      row.style.paddingLeft = (8 + depth * 18) + 'px';

      // Toggle arrow (directories only)
      const toggle = document.createElement('span');
      toggle.className = 'toggle';
      if (node.isDirectory && node.children && node.children.length > 0) {
        toggle.textContent = '▼';
      }
      row.appendChild(toggle);

      // Name
      const name = document.createElement('span');
      name.className = 'node-name' + (node.isDirectory ? ' dir' : '');
      const ext = (!node.isDirectory && node.storagePath)
        ? node.storagePath.substring(node.storagePath.lastIndexOf('.'))
        : '';
      name.textContent = node.name + ext;
      row.appendChild(name);

      // Type-specific metadata
      let metaText = '';
      if (node.typeCode === 'Word' && node.pageCount != null) {
        metaText = `${node.sizeFormatted}, ${node.pageCount} 頁`;
      } else if (node.typeCode === 'Image' && node.widthPx != null) {
        metaText = `${node.sizeFormatted}, ${node.widthPx}×${node.heightPx}`;
      } else if (node.typeCode === 'Text' && node.encoding) {
        metaText = `${node.sizeFormatted}, ${node.encoding}`;
      }
      if (metaText) {
        const meta = document.createElement('span');
        meta.className = 'node-meta';
        meta.textContent = metaText;
        row.appendChild(meta);
      }

      // Tags
      if (node.tags && node.tags.length > 0) {
        const tagsEl = document.createElement('span');
        tagsEl.className = 'tags';
        for (const tag of node.tags) {
          const chip = document.createElement('span');
          chip.className = 'tag-chip';
          chip.style.background = tag.color;
          chip.textContent = tag.name;
          tagsEl.appendChild(chip);
        }
        row.appendChild(tagsEl);
      }

      wrapper.appendChild(row);

      // Children
      let childrenEl = null;
      if (node.isDirectory && node.children && node.children.length > 0) {
        childrenEl = document.createElement('div');
        childrenEl.className = 'children';
        childrenEl.appendChild(renderTree(node.children, depth + 1));
        wrapper.appendChild(childrenEl);
      }

      // Register row in map for highlight lookup
      nodeRowMap.set(node.id, row);

      // Click: select + toggle + detail
      row.addEventListener('click', () => {
        // Update selected state
        if (selectedRow) selectedRow.classList.remove('selected');
        selectedNodeId = node.id;
        selectedRow = row;
        row.classList.add('selected');

        showDetail(node);
        log(`Selected: ${node.name} (${node.typeCode})`, 'info');
        if (childrenEl) {
          const collapsed = childrenEl.classList.toggle('hidden');
          toggle.textContent = collapsed ? '▶' : '▼';
        }
      });

      fragment.appendChild(wrapper);
    }

    return fragment;
  }

  // ---- Fetch ----
  async function loadTree() {
    log('Fetching /api/file-tree...', 'info');
    const container = document.getElementById('tree-container');

    try {
      const response = await fetch('/api/file-tree');
      if (!response.ok) {
        const text = await response.text();
        throw new Error(`HTTP ${response.status}: ${text}`);
      }

      const data = await response.json();
      const total = countNodes(data);

      container.innerHTML = '';
      container.appendChild(renderTree(data));

      log(`Loaded successfully. Total nodes: ${total}`, 'info');
      document.getElementById('status-dot').style.background = '#3fb950';
    } catch (err) {
      container.innerHTML = '<div class="loading-placeholder" style="color:#f85149">Failed to load tree.</div>';
      log(`Error: ${err.message}`, 'error');
      document.getElementById('status-dot').style.background = '#f85149';
    }
  }

  // ---- Toolbar actions ----
  async function calcSize() {
    const url = selectedNodeId
      ? `/api/file-tree/calculate-size?nodeId=${selectedNodeId}`
      : '/api/file-tree/calculate-size';
    const scope = selectedNodeId ? `節點 #${selectedNodeId}` : '全樹';
    log(`計算總容量（${scope}）中...`, 'info');
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      data.traversalLog.forEach(line => log(line, 'info'));
      log(`${scope} 總容量：${formatBytes(data.totalBytes)}`, 'info');
    } catch (err) {
      log(`計算失敗：${err.message}`, 'error');
    }
  }

  async function searchExt() {
    const ext = document.getElementById('ext-input').value.trim();
    if (!ext) { log('請輸入副檔名', 'warn'); return; }
    log(`搜尋副檔名 ${ext} 中...`, 'info');
    try {
      const res = await fetch(`/api/file-tree/search-ext?ext=${encodeURIComponent(ext)}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      data.traversalLog.forEach(line => log(line, 'info'));
      if (data.results.length === 0) {
        log(`找不到 ${ext} 的檔案`, 'warn');
      } else {
        log(`找到 ${data.results.length} 個 ${ext} 檔案：`, 'info');
        data.results.forEach(n => {
          log(`  → ${n.storagePath}`, 'info');
          const row = nodeRowMap.get(n.id);
          if (row) {
            row.classList.remove('highlight');
            void row.offsetWidth;
            row.classList.add('highlight');
          }
        });
      }
    } catch (err) {
      log(`搜尋失敗：${err.message}`, 'error');
    }
  }

  function clearLog() {
    document.getElementById('log-panel').innerHTML = '';
  }

  async function exportXml() {
    log('產生 XML 結構中...', 'info');
    try {
      const res = await fetch('/api/file-tree/xml');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const xml = await res.text();
      const blob = new Blob([xml], { type: 'text/xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'file-tree.xml';
      a.click();
      URL.revokeObjectURL(url);
      log('XML 已下載：file-tree.xml', 'info');
    } catch (err) {
      log(`XML 輸出失敗：${err.message}`, 'error');
    }
  }

  document.getElementById('ext-input').addEventListener('input', clearHighlights);

  loadTree();
</script>
</body>
</html>
